# Local analysis configuration template.
# Copy to configs/config.yaml and fill in the external data locations.

metadata_path: REPLACE_WITH_METADATA_XLSX_PATH
audio_root: REPLACE_WITH_RAW_AUDIO_ROOT
vtc_output_root: REPLACE_WITH_VTC_OUTPUT_ROOT
derived_data_dir: data/derived
private_data_dir: data/private
figures_dir: figures
tables_dir: tables
results_dir: results
metadata_id_column: par_id
recording_duration_source: raw_audio_sessions
session_selection: earliest
session_date_format: "%Y%m%d"
audio_layout:
  type: participant_folder
  participant_folder_name: "{par_id}"
  recursive: true
  audio_extensions: [".wav", ".WAV", ".flac", ".FLAC"]
  expected_audio_files: auto
  prefer_largest_audio_file: true
vtc_layout:
  type: participant_folder
  participant_folder_name: "{par_id}"
  rttm_csv_name: rttm.csv
participant_id_digits: 3
age_month_denominator: 30.44
ses_source: mother_education
minimum_recording_hours_warning: 1.0
manual_mapping_csv: