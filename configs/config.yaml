# Runtime configuration for HindiBabyNet-Pipeline.
# Keep machine-specific paths and workflow output locations here.

artifacts_root: artifacts/runs
logs_root: logs

paths:
  raw_audio_root: /home/arunps/hindinet_data/RawAudioData
  raw_joined_audio_root: /home/arunps/hindinet_data/RawJoinedAudio
  prepared_audio_root: /home/arunps/hindinet_data/PreparedAudio
  classification_output_root: /home/arunps/hindinet_data/Classification_outputs
  textgrid_output_root: /home/arunps/hindinet_data/TextGrids
  manual_annotation_root: /home/arunps/hindinet_data/ManualAnnotations
  evaluation_output_root: /home/arunps/hindinet_data/EvaluationOutputs

data_ingestion:
  allowed_ext: [".wav", ".WAV"]
  recordings_filename: recordings.parquet

audio_preparation:
  save_raw_joined_audio: true
  save_prepared_audio: true

speaker_classification:
  backend: vtc
  output_root: /home/arunps/hindinet_data/Classification_outputs

  xgb:
    model_path: models/xgb_egemaps.pkl

  vtc:
    repo_path: /home/arunps/VTC
    device: cpu
    keep_inputs: false
