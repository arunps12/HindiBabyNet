# ─── HindiBabyNet Pipeline Configuration ───
# This file is the single source of truth for all pipeline settings.
# Edit paths below to match your system, then run stages via:
#   uv run bash scripts/run_all.sh
#   uv run bash scripts/run_stage_03.sh

artifacts_root: artifacts/runs
logs_root: logs

# ─── Stage 01: Data Ingestion ───
data_ingestion:
  raw_audio_root: /path/to/your/raw/audio           # ← CHANGE THIS
  allowed_ext: [".wav", ".WAV"]
  recordings_filename: recordings.parquet

# ─── Stage 02: Audio Preparation ───
audio_preparation:
  processed_audio_root: /path/to/scratch/audio_processed  # ← CHANGE THIS
  target_sr: 16000
  to_mono: true
  target_peak_dbfs: -1.0
  combine_gap_sec: 0.0

# ─── Stage 03: Speaker Classification ───
# Both backends share output_root; outputs go to <output_root>/xgb/ or <output_root>/vtc/
speaker_classification:
  backend: xgb                  # "xgb" (default) or "vtc"
  output_root: /path/to/scratch/classification_outputs  # ← CHANGE THIS

  # ── XGB backend (native HindiBabyNet) ──
  xgb:
    model_path: models/xgb_egemaps.pkl
    class_names: ["adult_male", "adult_female", "child", "background"]
    egemaps_dim: 88

    # VAD (webrtcvad)
    vad_aggressiveness: 2
    vad_frame_ms: 30
    vad_min_region_ms: 300

    # Diarization (pyannote)
    diarization_model: "pyannote/speaker-diarization-3.1"
    chunk_sec: 900.0
    overlap_sec: 10.0
    min_speakers: 2
    max_speakers: 4

    # Merge & classify
    merge_gap_sec: 0.3           # merge same-speaker segments ≤ this gap
    min_segment_sec: 0.2         # discard segments shorter than this
    classify_win_sec: 1.0        # eGeMAPS extraction window (seconds)
    classify_hop_sec: 0.5        # eGeMAPS window hop (seconds)

  # ── VTC backend (external VTC 2.0) ──
  vtc:
    repo_path: external_models/VTC    # path to cloned VTC repo
    device: cpu                       # cpu / cuda / gpu / mps
    keep_inputs: false                # keep temp VTC input folders after inference
